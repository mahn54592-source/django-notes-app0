version: "3.8"

services:
  nginx:
    build: ./nginx
    image: nginx
    container_name: "nginx_cont"
    ports:
      - "80:80"
    restart: always
    depends_on:
      - django_app
    networks:
      - notes-app-nw
    volumes:
      - ./staticfiles:/app/backend/staticfiles
      - ./media:/app/backend/media

  django_app:
    build:
      context: .
    image: django_app
    container_name: "django_cont"
    ports:
      - "8080:8000"  # Changed from 8000:8000 to 8080:8000
    environment:
      - USE_SQLITE=True
      - DEBUG=True
      - SECRET_KEY=*gt_#g3b2gzz-mmf(tpxu%r1jar7vwf!ygy11df9m8*+e)nrj%
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"
    restart: always
    volumes:
      - ./db.sqlite3:/app/backend/db.sqlite3
      - ./staticfiles:/app/backend/staticfiles
      - ./media:/app/backend/media
    networks:
      - notes-app-nw

networks:
  notes-app-nw:
    driver: bridge  # Added network driver